### ----------------------------------------------------------------------------
### 安全配置
### ----------------------------------------------------------------------------
[security]
### 是否启用 Cookie 的 Secure 属性
cookie_secure = false

### ----------------------------------------------------------------------------
### HTTP 服务相关配置
### ----------------------------------------------------------------------------
[http]
### 服务绑定的 IP 地址
bind_ip = "0.0.0.0"
### 服务绑定的端口号
bind_port = 80
### 优雅关机的超时时间
shutdown_timeout = "30s"

### ----------------------------------------------------------------------------
### 日志配置
### ----------------------------------------------------------------------------
[logger]
### 日志记录级别
level = "info"
### 启用日志文件输出
enable_file_output = false
### 日志文件存储目录
file_dir = "log"
### 日志文件名前缀
file_prefix = "myblog.log"
### 日志文件最大保留数量
max_keep_files = 7

### ----------------------------------------------------------------------------
### 请求体大小限制配置
### ----------------------------------------------------------------------------
[body_limit]
### 默认请求体大小限制
default_limit = "2MiB"
### 自定义请求体大小限制规则列表
rules = [
    { path = "/api/resource/upload", method = "POST", limit = "100MiB" },
    { path = "/api/article/upload_attachment", method = "POST", limit = "500MiB" },
]

### ----------------------------------------------------------------------------
### 数据库配置
### ----------------------------------------------------------------------------
[database]
### 连接字符串
url = "sqlite::memory:"

### ----------------------------------------------------------------------------
### SQLite 配置
### ----------------------------------------------------------------------------
[database.sqlite]
### 扩展文件目录
extensions_dir = "sqlite/extensions"

### ----------------------------------------------------------------------------
### 数据库迁移配置
### ----------------------------------------------------------------------------
[database.migrations]
### 是否自动运行迁移
auto_migrate = true
### 迁移脚本的扩展名
script_extension = ".sql"
### 迁移脚本存放目录
script_dir = "sqlite/migrations"

### ----------------------------------------------------------------------------
### 数据库日志配置
### ----------------------------------------------------------------------------
[database.log]
### 获取连接耗时过长时使用的日志级别
acquire_slow_level = "WARN"
### 当获取连接的耗时超过此阈值时，将使用 acquire_slow_level 对应的日志级别记录
acquire_slow_threshold = "3s"

### ----------------------------------------------------------------------------
### 数据库连接池配置
### ----------------------------------------------------------------------------
[database.pool]
### 最小连接数量
min_connections = 6
### 最大连接数量
max_connections = 6
### 连接获取超时时间
acquire_timeout = "6s"
### 连接空闲超时时间
idle_timeout = "10m"
### 连接最大保持时间
max_lifetime = "30m"

### ----------------------------------------------------------------------------
### 资源文件配置
### ----------------------------------------------------------------------------
[resource]
### 上传文件的存储目录
upload_dir = "data/upload"
### 上传文件的大小限制
upload_file_max_size = "1GiB"
### 回收站目录
trash_dir = "data/trash"
### 孤立文件移入回收站的时间阈值
trash_threshold = "8h"
### 公开文件的存储目录
public_dir = "data/public"

### ----------------------------------------------------------------------------
### 管理员配置
### ----------------------------------------------------------------------------
[admin]
### 会话有效期
session_ttl = "24h"
### 登录解锁尝试次数统计的时间窗口
login_try_window = "10m"
### 登录解锁时间窗口内允许的最大尝试次数
login_try_max_times = 5
### 登录解锁尝试次数超限后的封禁时长
login_ban_ttl = "15m"

### ----------------------------------------------------------------------------
### 主题配置
### ----------------------------------------------------------------------------
[theme]
### 主题文件存储的目录路径
dir = "themes"
### 用户自定义主题目录
custom_dir = "data/theme"
### 代码语法的来源（可选值：default/theme/custom）
code_syntax_source = "theme"
### 代码主题的来源（可选值：default/theme/custom）
code_themes_source = "theme"
### 当前使用的页面主题名称
current_page_theme = "simple"
### 当前使用的代码主题名称
current_code_theme = "Tomorrow"
### 渲染版本号
render_version = "default"

### ----------------------------------------------------------------------------
### 定时任务配置
### ----------------------------------------------------------------------------
[cron.tasks.prune_cache]
### 启用定时任务
enabled = true
### 日程表达式
schedule = "0 */5 * * * *"

[cron.tasks.prune_failed_attempts]
### 启用定时任务
enabled = true
### 日程表达式
schedule = "0 */5 * * * *"

[cron.tasks.purge_orphaned_resources]
### 启用定时任务
enabled = true
### 日程表达式
schedule = "0 0 2 * * *"

### ----------------------------------------------------------------------------
### 文章配置
### ----------------------------------------------------------------------------
[article]
### 文章访问许可有效期
access_ttl = "1h"
### 全文搜索匹配结果最大输出条目
full_text_search_limit = 100
### 文章标题最大长度限制
title_max_length = 80
### 文章摘要最大长度限制
excerpt_max_length = 200
### 文章正文最大字节限制
content_max_size = "2MiB"
### 文章解锁尝试次数统计的时间窗口
unlock_try_window = "10m"
### 文章解锁时间窗口内允许的最大尝试次数
unlock_try_max_times = 5
### 文章解锁尝试次数超限后的封禁时长
unlock_ban_ttl = "15m"
### 作为 About 页面的文章
# about_article_id = "文章ID"

### ----------------------------------------------------------------------------
### 游客配置
### ----------------------------------------------------------------------------
[visitor]
### 游客会话的有效期
session_ttl = "24h"
### 游客会话自动续期的触发阈值
session_keep_threshold = "8h"

### ----------------------------------------------------------------------------
### simple 主题自定义配置
### ----------------------------------------------------------------------------
[theme.extensions]
### 网站标题
title = "My Blog"
### 网站描述
description = ""
### 网站的基础网址
base_url = ""
### 网站图标
favicon_ico = "/theme/assets/image/favicon.ico"
### 首页图片
home_img = "/theme/assets/image/home.png"
